  <!-- Hose -->
  <rect x="48" y="80" width="32" height="20" fill="#7b4a24"/>
  <rect x="48" y="80" width="32" height="6" fill="#5b3a1a"/>

  <!-- Beine -->
  <rect x="52" y="100" width="8" height="16" fill="#f2c9a1"/>
  <rect x="68" y="100" width="8" height="16" fill="#f2c9a1"/>

  <!-- Schuhe -->
  <rect x="50" y="114" width="12" height="6" fill="#2b2b2b"/>
  <rect x="66" y="114" width="12" height="6" fill="#2b2b2b"/>

</svg>
