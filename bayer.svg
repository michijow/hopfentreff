<svg width="48" height="106" viewBox="40 14 48 106"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Hut -->
  <polygon points="40,32 88,32 80,20 48,20"
           fill="#3b4a2f"/>
  <polygon points="52,20 76,20 72,14 56,14"
           fill="#2b3622"/>

  <!-- Kopf -->
  <circle cx="64" cy="44" r="14" fill="#f2c9a1"/>

  <!-- Augen -->
  <rect x="56" y="40" width="4" height="2" fill="#3b2b1a"/>
  <rect x="68" y="40" width="4" height="2" fill="#3b2b1a"/>
  <path d="M54 38 L60 40" stroke="#3b2b1a" stroke-width="2"/>
  <path d="M70 40 L76 38" stroke="#3b2b1a" stroke-width="2"/>

  <!-- Mund -->
  <path d="M58 48 Q64 52 70 48"
