  <!-- Körper -->
  <rect x="46" y="56" width="36" height="26" rx="4"
        fill="#ffffff" stroke="#3b2b1a" stroke-width="2"/>

  <!-- Hosenträger -->
  <path d="M48 80 L56 56" stroke="#5b3a1a" stroke-width="4"/>
  <path d="M80 80 L72 56" stroke="#5b3a1a" stroke-width="4"/>

  <!-- Arme verschränkt -->
